<h5 class="sidebar-header">
  <a class="no-decoration" href="/about/">Inputs</a>
</h5>
<ul>
  {% for item in menu.about.items %}
    <li class="{% if page.url == item.url %}bold{% endif %}">
      {% if page.url == item.url %}
        {{ item.title }}
      {% else %}
        <a href="{{ item.url }}">{{ item.title }}</a>
      {% endif %}
    </li>
  {% endfor %}
</ul>

{% if menu.about.featured %}
  <div class="sidebar-section mobile-hidden">
  <span class="sidebar-header">Outputs</span>
  <ul>
      {% for item in menu.about.featured %}
      <li>
          <a href="{{ item.url }}">
          {{ item.title }}
          </a>
      </li>
      {% endfor %}
  </ul>
  </div>
{% endif %}
