# Malermeister LLC — plan vs actual. Funnel: bookings (work booked) → completed (value
# delivered) → collected (cash in). completed.actual ties to cashflow.yml revenue. The
# EUR shock (Nov 2024 → Feb 2025) hit margin more than volume; March rebounds. AED.

funnelStages:
  - { id: "bookings",  label: "Bookings",  icon: "event_available", description: "Work booked in", color: "#8B5CF6" }
  - { id: "completed", label: "Completed", icon: "task_alt",        description: "Value delivered (vehicles released)", color: "#10B981" }
  - { id: "collected", label: "Collected", icon: "payments",        description: "Cash collected", color: "#F59E0B" }

monthly:
