  - { month: "2025-01", plan: { bookings: 450000, completed: 450000, collected: 450000 }, actual: { bookings: 410000, completed: 400000, collected: 395000 }, note: "Shock — dear EUR paint compresses margin to near-zero." }
  - { month: "2025-02", plan: { bookings: 450000, completed: 450000, collected: 450000 }, actual: { bookings: 390000, completed: 380000, collected: 360000 }, note: "Shock trough." }
  - { month: "2025-03", plan: { bookings: 480000, completed: 480000, collected: 470000 }, actual: { bookings: 520000, completed: 500000, collected: 480000 }, note: "Bounce — throughput and margin recover." }

