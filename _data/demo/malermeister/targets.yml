  - { month: "2024-08", plan: { bookings: 400000, completed: 400000, collected: 400000 }, actual: { bookings: 310000, completed: 300000, collected: 330000 } }
  - { month: "2024-09", plan: { bookings: 470000, completed: 470000, collected: 450000 }, actual: { bookings: 490000, completed: 480000, collected: 455000 } }
  - { month: "2024-10", plan: { bookings: 490000, completed: 490000, collected: 480000 }, actual: { bookings: 520000, completed: 520000, collected: 500000 }, note: "Autumn peak (Cullinan + fleet)." }
