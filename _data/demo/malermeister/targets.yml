  - { month: "2024-03", plan: { bookings: 460000, completed: 460000, collected: 450000 }, actual: { bookings: 480000, completed: 470000, collected: 450000 } }
  - { month: "2024-04", plan: { bookings: 480000, completed: 480000, collected: 470000 }, actual: { bookings: 520000, completed: 510000, collected: 490000 } }
  - { month: "2024-05", plan: { bookings: 450000, completed: 450000, collected: 450000 }, actual: { bookings: 430000, completed: 440000, collected: 420000 } }
