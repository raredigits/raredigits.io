# premium pricing. Operates in AED; buys paint/materials in EUR and pays dividends in EUR
# (the holding's multi-currency showcase). Smallest business in the group.

profile:
  legalName: "Malermeister Auto Refinishing LLC"
  brandName: "Malermeister"
  tagline: "Deutsche Lackiermeister. In Dubai. Kompromisslos."
  type: "services"
  fulfillmentLabel: "Vehicles released"
  founded: "2019-10-01"
  acquired: "2023-07-01"            # acquired by Ambitions Inc.
  hq: "Unit 7, Al Quoz Industrial Area 4, Dubai"
  trn: "100774099800003"
  license: "DED-CN-0913277"

