# Spotlights Ltd — sales pipeline (powers the Atlas ERP kanban).
# stage: new | qualified | proposal | negotiation | won | lost — matches the five kanban
# columns (won/lost leave the board). probability is the stage default unless a deal
# carries better information. Weighted pipeline = Σ value × probability over open stages —
# the UI computes it, nothing here stores it.
# client → clients.yml (incl. status: prospect); owner → staff.yml; products → products.yml.
# value is net of VAT, in AED unless currency overrides. Fiction "today" = 2025-03-28.

stageDefaults:
  - { stage: "new",         label: "New",           probability: 0.10 }
  - { stage: "qualified",   label: "Qualified",     probability: 0.25 }
  - { stage: "proposal",    label: "Proposal sent", probability: 0.50 }
  - { stage: "negotiation", label: "Negotiation",   probability: 0.70 }
  - { stage: "won",         label: "Won",           probability: 1.0 }
  - { stage: "lost",        label: "Lost",          probability: 0.0 }

