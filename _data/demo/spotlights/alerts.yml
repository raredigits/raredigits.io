# Spotlights Ltd — alert rules + active alerts as of 2025-03-28.
# severity: critical | high | medium | low | info
# categories: stock | ar | ap | fx | margin | shipment | ops

rules:
  - { id: "rule-stockout-reserved", name: "Available stock below reorder under confirmed orders", category: "stock", enabled: true, severity: "high", condition: "onHand - reserved < reorderPoint", notify: ["spl-ops-head", "spl-sales-head"] }
  - { id: "rule-ap-overdue", name: "Supplier invoice overdue", category: "ap", enabled: true, severity: "medium", condition: "days_overdue > 0", notify: ["spl-finance", "spl-md"] }
  - { id: "rule-fx-exposure", name: "Unhedged FX payables above threshold", category: "fx", enabled: true, severity: "medium", condition: "open_fx_payables_aed > 800000", notify: ["spl-finance", "spl-md"] }
  - { id: "rule-margin-drop", name: "Monthly gross margin below 18%", category: "margin", enabled: true, severity: "high", condition: "monthly_gp_pct < 0.18", notify: ["spl-md", "spl-finance"] }
  - { id: "rule-shipment-late", name: "Shipment past requested delivery", category: "shipment", enabled: true, severity: "high", condition: "deliveryStatus == delayed-customs", notify: ["spl-ops-head", "spl-sales-head"] }
  - { id: "rule-credit-watch", name: "Client paying beyond terms", category: "ar", enabled: true, severity: "medium", condition: "avg_days_late > 20", notify: ["spl-finance", "spl-sales-head"] }

active:
