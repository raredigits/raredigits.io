# Monthly plan vs actual — four funnel stages tracked separately:
#   sales       = new contract value SIGNED in month (bookings, forward-looking)
#   production  = revenue value of work DELIVERED (recognised) in month
#   deliveries  = invoice value ISSUED in month (billing)
#   payments    = cash COLLECTED in month
# Plan ≠ Actual on most months — that's the point. Seasonality + drama.
# All figures in AED.

funnelStages:
  - id: "sales"
    label: "Sales"
    icon: "trending_up"
    description: "New contract value booked"
    color: "#3B82F6"
  - id: "production"
    label: "Production"
    icon: "construction"
    description: "Revenue recognised from delivered work"
    color: "#8B5CF6"
  - id: "deliveries"
    label: "Deliveries"
    icon: "receipt_long"
    description: "Invoices issued"
    color: "#10B981"
  - id: "payments"
    label: "Payments"
    icon: "payments"
    description: "Cash collected"
    color: "#F59E0B"

# Annual headline targets
annual:
  - year: 2024
    revenuePlan: 24000000
    revenueActual: 20830000
    grossMarginPlanPct: 30
    grossMarginActualPct: 22.6
    ebitdaPlan: 1800000
    ebitdaActual: -1540000
    note: "Year missed — Ancient Moon cancellation single-handedly turned plan to loss"

  - year: 2025
    revenuePlan: 32000000
    revenueActual: 35340000
