# Operational KPI targets (non-financial)
operationalTargets:
  dso:
    target: 45
    yellowAt: 55
    redAt: 70
    note: "Industry benchmark 50–60; we set 45 to keep cash agile"

  cashRunwayDays:
    target: 90
    yellowAt: 60
    redAt: 30
    note: "Unrestricted cash / monthly OpEx"

  grossMarginPct:
    target: 32
    yellowAt: 28
    redAt: 24

  utilisationPct:
    target: 75
    yellowAt: 65
    redAt: 55
    note: "Billable hours / available hours, core production team"

  projectOverrunRatePct:
    target: 5
    yellowAt: 10
    redAt: 15
