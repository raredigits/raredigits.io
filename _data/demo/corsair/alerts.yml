# Notification preferences (for Settings page)
notificationChannels:
  email:
    enabled: true
    digestFrequency: "real-time-critical, daily-digest-rest"
  slack:
    enabled: true
    workspace: "thecrisistheater.slack.com"
    channels:
      critical: "#alerts-fire"
      high: "#alerts-finance"
      medium: "#ops-watch"
      low: "#ops-watch"
  sms:
    enabled: true
    severityThreshold: "critical"
    recipients: ["cfo", "founder-md"]
  dashboard:
    enabled: true
    badgeOn: ["medium", "high", "critical"]

# Quiet hours (no non-critical pings)
quietHours:
  enabled: true
  start: "22:00"
  end: "07:00"
  timezone: "Asia/Dubai"
  exceptions: ["critical"]

# Summary counters (for dashboard pill)
summary:
