# Alert rules + currently active alerts as of 2026-03-28.
# Severity: critical | high | medium | low | info
# Categories: cash, ar, ap, project, fx, payroll, compliance, ops

# === ALERT RULES (configurable in Settings) ===
rules:

  - id: "rule-dso-spike"
    name: "DSO crossed 60 days"
    category: "ar"
    enabled: true
    severity: "high"
    condition: "rolling_90d_dso > 60"
    notify: ["cfo", "founder-md"]
    channel: "email + dashboard"

  - id: "rule-invoice-overdue-7"
    name: "Invoice overdue > 7 days"
    category: "ar"
    enabled: true
    severity: "medium"
    condition: "days_overdue > 7"
    notify: ["cfo", "owner_account_manager"]
    channel: "dashboard"

  - id: "rule-invoice-overdue-30"
    name: "Invoice overdue > 30 days"
    category: "ar"
    enabled: true
    severity: "high"
    condition: "days_overdue > 30"
    notify: ["cfo", "founder-md", "owner_account_manager"]
    channel: "email + dashboard + slack"

  - id: "rule-project-overrun-15"
    name: "Project cost overrun ≥ 15% of budget"
    category: "project"
    enabled: true
    severity: "high"
    condition: "actual_cost / budget > 1.15"
    notify: ["cfo", "head-prod", "owner_producer"]
    channel: "email + dashboard"

  - id: "rule-project-burn-vs-progress"
    name: "Cost-to-date outpaces timeline progress"
    category: "project"
    enabled: true
    severity: "medium"
    condition: "(cost_to_date / budget) > (elapsed_days / total_days) + 0.10"
    notify: ["head-prod", "owner_producer"]
    channel: "dashboard"

  - id: "rule-fx-exposure"
    name: "USD AR exposure > USD 100K unhedged"
    category: "fx"
    enabled: true
    severity: "medium"
    condition: "usd_ar_open > 100000"
    notify: ["cfo"]
    channel: "dashboard"

  - id: "rule-cash-runway"
    name: "Unrestricted cash < 60 days OpEx"
    category: "cash"
    enabled: true
    severity: "critical"
    condition: "unrestricted_cash / monthly_opex < 2"
    notify: ["cfo", "founder-md", "founder-cd"]
    channel: "email + dashboard + sms"

  - id: "rule-escrow-mix"
    name: "Restricted cash > 50% of total"
    category: "cash"
    enabled: true
    severity: "low"
    condition: "restricted_cash / total_cash > 0.5"
    notify: ["cfo"]
    channel: "dashboard"

  - id: "rule-vendor-paid-late"
    name: "Vendor invoice paid > 5 days late"
    category: "ap"
    enabled: true
    severity: "low"
    condition: "days_late_paid > 5"
    notify: ["cfo"]
    channel: "dashboard"

  - id: "rule-permit-expiry"
    name: "Event permit expires in < 14 days"
    category: "compliance"
    enabled: true
    severity: "high"
    condition: "permit_days_to_expiry < 14"
    notify: ["bookings", "owner_producer"]
    channel: "email + dashboard"

  - id: "rule-payroll-coverage"
    name: "WPS account < 1.2× upcoming run"
    category: "payroll"
    enabled: true
    severity: "high"
    condition: "wps_balance / next_payroll < 1.2"
    notify: ["cfo", "hr"]
    channel: "email + dashboard"

  - id: "rule-disputed-invoice"
    name: "Disputed invoice older than 14 days"
    category: "ar"
    enabled: true
    severity: "high"
    condition: "status == 'disputed' AND days_open > 14"
    notify: ["cfo", "founder-md", "owner_account_manager"]
    channel: "email + dashboard"

  - id: "rule-change-order-unsigned"
    name: "Unsigned change order > 7 days"
    category: "project"
    enabled: true
    severity: "high"
    condition: "change_order_value > 50000 AND days_unsigned > 7"
    notify: ["cfo", "head-acc", "owner_producer"]
    channel: "email + dashboard + slack"

