# Monthly cashflow & P&L roll-up — 27 months, Jan 2024 → Mar 2026.
# All amounts in AED.
# revenue   = recognised revenue (accrual basis)
# cogs      = direct cost of project delivery (talent, crew, materials, venue, permits)
# gp        = gross profit (revenue − cogs)
# opex      = studio overhead (payroll, rent, software, marketing, professional fees)
# ebitda    = gp − opex
# cashIn / cashOut = actual cash movement (operating)
# cashEnd   = aggregate cash position end-of-month (all 4 banks, AED equivalent)
# arEnd     = accounts receivable balance end-of-month
# apEnd     = accounts payable balance end-of-month
# dso       = days sales outstanding (rolling 90d)

