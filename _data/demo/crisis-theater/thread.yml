# The Crisis Theater — relationship threads (powers Columbus CRM "The Thread").
# One thread per key relationship: the long history in one place — phases, entries,
# captured small things, promises, and what the relationship has produced.
# client → clients.yml; refs → invoices/projects. quiet detection: quietAfterDays is the
# relationship's normal cadence; lastTouch beyond it raises a quiet alert (Aldira is the
# live example). Fiction "today" = 2025-03-28.

phaseModel: ["met", "first-deal", "trust", "expansion", "advocate"]

contacts:
  - { id: "kp-emaar-farah",   client: "emaar",      name: "Farah Al Suwaidi", role: "VP Brand Experience",        orbit: "champion",       since: "2019-11" }
  - { id: "kp-emaar-vikram",  client: "emaar",      name: "Vikram Shetty",    role: "Procurement Director",       orbit: "gatekeeper",     since: "2021-03" }
  - { id: "kp-aldira-samir",  client: "aldira",     name: "Samir Kassab",     role: "CMO",                        orbit: "economic-buyer", since: "2023-05" }
  - { id: "kp-aldira-rita",   client: "aldira",     name: "Rita Aoun",        role: "AP Supervisor",              orbit: "gatekeeper",     since: "2024-11" }
  - { id: "kp-dtcm-khalid",   client: "dtcm",       name: "Khalid Al Marri",  role: "Director, City Events",      orbit: "sponsor",        since: "2020-02" }
  - { id: "kp-royalg-majlis", client: "royal-g",    name: "(Majlis office — name withheld)", role: "Private Secretary", orbit: "gatekeeper", since: "2022-09", note: "All contact in person or by phone. No email trail permitted — log summaries only." }
