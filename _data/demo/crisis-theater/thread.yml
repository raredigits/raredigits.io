threads:

  # ---------- Aldira Group — the quiet-detection showcase ----------
  - client: "aldira"
    primaryContact: "kp-aldira-samir"
    phase: "trust"
    health: "at-risk"
    lastTouch: "2025-02-15"
    quietAfterDays: 10
    quietAlert: true
    entries:
      - { date: "2023-05-18", type: "meeting",  title: "First meeting — Solstice Souk sponsorship pitch", body: "Samir wants a flagship winter property. Budget owner is him directly; board sign-off above AED 1M.", tags: ["sponsorship"] }
      - { date: "2023-12-02", type: "milestone", title: "Solstice Souk 2023 — title sponsor", body: "First deal closed. Activation delivered clean; Samir presented results to their board himself.", tags: ["won"] }
      - { date: "2024-06-11", type: "meeting",  title: "Renewal over lunch — La Petite Maison", body: "Renewed title sponsorship for 2024 on a handshake. Samir asked for earlier creative previews this year.", tags: ["renewal"] }
      - { date: "2024-12-20", type: "event",    title: "Solstice Souk 2024 closed — record footfall", body: "48K visitors over the weekend, +22% vs 2023. Samir on stage for the closing. Final tranche invoiced (TCT-2024-156).", refs: ["TCT-2024-156", "p-2024-013"], tags: ["delivery"] }
      - { date: "2025-01-28", type: "call",     title: "Payment chase — routed to AP", body: "Samir warm but vague; passed us to Rita Aoun in AP. 'Processing, two weeks.'", tags: ["ar"] }
      - { date: "2025-02-15", type: "email",    title: "Last contact — Rita confirms 'in the queue'", body: "Nothing since. Samir not answering; Rita's mailbox auto-replies.", tags: ["ar"] }
      - { date: "2025-02-25", type: "silence-alert", title: "Thread gone quiet — 10-day cadence breached", body: "Normal cadence with Aldira is under 10 days. Escalated to founder-md; demand letter drafted.", refs: ["alert-2025-002"], tags: ["quiet"] }
    smallThings:
      - "Samir's daughter plays competitive padel — he skips Thursday evening calls."
      - "Hates being CC'd with his own AP team — route payment talk separately."
      - "Board meets last Sunday of the month; approvals land the week after."
    promises:
      - { who: "them", what: "Settle final tranche AED 798K (TCT-2024-156)", due: "2025-02-20", status: "broken", ref: "TCT-2024-156" }
      - { who: "us",   what: "2025 renewal proposal with earlier creative previews", due: "2025-04-30", status: "open", note: "On hold pending settlement — do not send while AR is open." }
    produced:
      revenueAED: 3050000
      projects: ["p-2024-013"]
      introductions: []

