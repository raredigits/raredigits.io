# Stock phrases the UI can show on otherwise-quiet widgets
chatter:
  green:
    - "All quiet on this front. Carry on."
    - "Within tolerance. Champagne on ice, not on tap."
    - "No notes. Genuinely."
  yellow:
    - "Worth a glance, not a panic."
    - "I'll check back in 24 hours unless this moves."
    - "One degree off course. Easily corrected if caught now."
  red:
    - "This needs a decision today."
    - "Not a drill."
    - "I'd reschedule lunch."

# Five management lenses — one nudge per angle (money | operations | strategy | cfo | sales | hr).
lenses:
  - lens: "money"
    label: "Money / line profitability"
    severity: "info"
    stance: "watch"
    headline: "A record quarter that leans on two nights."
    body: "Q1 beat plan by about 9.6% on the back of Lantern Bay's AED 5.8M March — magnificent, and concentrated. The year's margin rides on two or three events, and Aurora Gala is quietly bleeding it. Celebrate the festival; ring-fence the gala."
    actions: ["Cap Aurora's overrun before it eats the Lantern Bay upside"]
    refs: ["cashflow"]

  - lens: "operations"
    label: "Operations — current problems & risks"
    severity: "warning"
    stance: "push-production"
    headline: "You're building Aurora against an unsigned change order."
    body: "Vision Realm KSA still hasn't signed the variation, yet the scope is being delivered — the single largest live risk this quarter. Behind it, the bench frees up once Lantern Bay strikes, so production capacity is about to swing from stretched to slack."
    actions: ["Stop further Aurora spend until the change order is signed", "Re-plan May crews around the post-festival dip"]
    refs: ["cashflow"]

  - lens: "strategy"
    label: "Strategy — forecast & options"
    severity: "info"
    stance: "watch"
    headline: "The festivals are the moat. The seasons are the enemy."
    body: "Owned festival IP — Lantern Bay, Ancient Moon — is both the cash engine and the differentiator; the exposure is seasonality and event concentration. Options worth weighing: productise the repeatable festival format, license the IP to other markets, and fill the summer trough with brand activations."
    actions: ["Scope a licensable festival playbook", "Build a summer brand-activation pipeline"]
    refs: ["cashflow"]

  - lens: "cfo"
    label: "Financial position (CFO)"
    severity: "warning"
    stance: "tighten-ar"
    headline: "AED 5.64M that isn't yours to spend — and AED 800K that should be."
    body: "The escrow is earmarked for the 15 April festival vendor settlement; read it as restricted, not as cash. Unrestricted operating cash is a healthy AED 9.1M. DSO has fallen to 51 from a 78-day peak, but Aldira's AED 800K is 36 days overdue — your largest single collection risk."
    actions: ["Escalate the Aldira collection this week", "Keep the escrow visually separated on the cash view"]
    refs: ["TCT-2024-156", "cashflow"]

  - lens: "sales"
    label: "Sales"
    severity: "info"
    stance: "push-sales"
    headline: "You sold out the festival. Now sell the summer."
    body: "Bookings are festival-loaded, which leaves May–August thin. The pipeline that smooths the year is brand activations and private commissions, not another festival — and the owned IP is itself a sales asset through repeat sponsors and licensing. Sell into the trough while the Lantern Bay glow still opens doors."
    actions: ["Build a May–August brand-activation pipeline", "Lock next year's Lantern Bay sponsor renewals now"]
    refs: ["cashflow"]

  - lens: "hr"
    label: "People"
    severity: "info"
    stance: "freeze-hire"
    headline: "Eighteen people, and May about to go quiet."
    body: "With Lantern Bay delivered and only Aurora plus a handful of installations live, productive utilisation dips to roughly 62% in May. Freeze the planned creative hire for a month and lean on the freelance bench; revisit only if the slack persists into June."
    actions: ["Hold the creative hire until June", "Shift May load to freelancers, not new FTE"]
    refs: ["staff"]
