# Jeeves GPT — contextual nudges shown alongside Corsair widgets.
# Tone: butler-precise, brief, actionable. No filler.
# severity: critical | warning | info | nice
# stance: push-sales | push-production | cut-costs | tighten-ar | watch | hold | hire | freeze-hire | hedge | reassure
# scope: dashboard | production | money | staff | finance | settings | notifications | <project-id> | <invoice-no>

profile:
  name: "Jeeves"
  product: "Jeeves GPT"
  brand: "by Rare Digits"
  signature: "— Jeeves"
  avatar: "/assets/img/demo/corsair/jeeves.svg"
  invocation: "Ask Jeeves"
  tagline: "Butler-precision insights for executives who'd rather be at the regatta."

# Insights surfaced "today" (2025-03-28). Reference projects/invoices/alerts by id.
todaySummary:
  headline: "Two fires, one breeze, and a champagne dilemma."
  body: "Aurora Gala is bleeding margin while Vision Realm refuses to sign the change order — that is your single largest live risk this quarter. Aldira is still ghosting AED 800K. Lantern Bay 2025 sold out and Q1 beat plan by 9.6%. The escrow account holds AED 5.6M earmarked for vendor settlement on April 15 — do not look at that number as cash."
  stance: "watch"
  severity: "warning"
  refresh: "2025-03-28T08:00:00+04:00"

# Keyed insights — one per scope/page where Jeeves is invoked
